{% extends "base.html" %}

{% block title %}Capture Face{% endblock %}

{% block content %}
<div class="capture-page">
  <div class="overlay">
    <span class="top-close" onclick="closeCamera()">❌</span>
    <h2>Capture Faculty Data</h2>
    <div class="form-layout">

      <!-- Left side: Camera / Preview -->
      <div class="camera-container">
        <video id="video" autoplay></video>
        <canvas id="canvas" class="hidden"></canvas>
      </div>

      <!-- Right side: Input -->
      <div class="form-inputs">
        <label><strong>Faculty ID (short name):</strong></label>
        <input type="text" id="facultyId" placeholder="e.g. divya" required>

        <label><strong>Full Name:</strong></label>
        <input type="text" id="fullName" placeholder="Enter full name" required>

        <label><strong>Phone:</strong></label>
        <input type="text" id="phone" placeholder="Enter phone" required>

        <label><strong>Subject:</strong></label>
        <input type="text" id="subject" placeholder="Enter subject" required>

        <label><strong>Upload Profile Photo:</strong></label>
        <input type="file" id="photoUpload" accept="image/*">

        <div class="actions">
          <button type="button" class="capture-btn" onclick="captureImage()">📸 Capture Image</button>
          <button type="button" class="save-btn" onclick="saveData()">💾 Save</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
    let video = document.getElementById('video');
    let canvas = document.getElementById('canvas');
    let context = canvas.getContext('2d');
    let captured = false;

    // Start webcam
    navigator.mediaDevices.getUserMedia({ video: true })
        .then(stream => { video.srcObject = stream; })
        .catch(err => { alert("Camera access denied: " + err); });

    function captureImage() {
    // Draw video frame into canvas
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    context.drawImage(video, 0, 0, canvas.width, canvas.height);

    // Hide video, show canvas in the same container
    video.classList.add("hidden");
    canvas.classList.remove("hidden");

    captured = true;
}


    async function saveData() {
        let facultyId = document.getElementById('facultyId').value.trim();
        let fullName = document.getElementById('fullName').value.trim();
        let phone = document.getElementById('phone').value.trim();
        let subject = document.getElementById('subject').value.trim();
        let fileInput = document.getElementById('photoUpload');

        if (!facultyId || !fullName || !phone || !subject) {
            alert("Please fill all fields!");
            return;
        }

        if (!captured) {
            alert("Please capture an image first!");
            return;
        }

        // Captured webcam image → base64
        let dataUrl = canvas.toDataURL("image/jpeg");

        let formData = new FormData();
        formData.append("facultyId", facultyId);
        formData.append("fullName", fullName);
        formData.append("phone", phone);
        formData.append("subject", subject);
        formData.append("capturedImg", dataUrl);

        if (fileInput.files.length > 0) {
            formData.append("uploadedPhoto", fileInput.files[0]);
        }

        fetch("/save_faculty", {
            method: "POST",
            body: formData
        })
        .then(res => res.json())
        .then(data => {
            alert(data.message);
            window.location.href = "/";
        })
        .catch(err => alert("Error: " + err));
    }

    function closeCamera() {
        if (video.srcObject) {
            let tracks = video.srcObject.getTracks();
            tracks.forEach(track => track.stop());
        }
        window.location.href = "/";
    }
</script>

{% endblock %}
